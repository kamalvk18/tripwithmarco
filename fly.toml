# fly.toml app configuration file generated for solo-travel-agent on 2026-05-23T22:54:23+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'solo-travel-agent'
primary_region = 'lhr'

[build]

[env]
  PORT = '8080'
  DB_FILE = '/data/trips.db'

[[mounts]]
  source = 'travel_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
